<!DOCTYPE html>
<html>
<head>
    <title>Orientation Scolaire</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="{{ theme }}">
    <div class="header">
        <h1>Orientation Scolaire</h1>
        <button onclick="window.location.href='/toggle_theme'" class="theme-toggle">
            {% if theme == 'light' %}🌙 Mode sombre{% else %}☀️ Mode clair{% endif %}
        </button>
    </div>
    <div class="container">
        <div class="card" style="text-align: center;">
            <h1>🎓 Bienvenue !</h1>
            <p>Aidez les élèves de 3ème à choisir leur voie</p>
            <div class="buttons">
                <a href="/inscription" class="btn">S'inscrire</a>
                <a href="/login" class="btn">Se connecter</a>
            </div>
        </div>
    </div>
</body>
</html>
